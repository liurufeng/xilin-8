<script>
function settop(k){
	var val = jQuery("#top_id_"+k+"").val();
jQuery.ajax({
    type: "GET",
    url: "<?=$_SESSION['admin_path']?>info/top/",
    data: 'id='+k+'&val='+val+'',
    dataType: "Json",
    success: function (data) {
	if(data!="11"){
		 alert("操作失败");
	}else{
		if(val=="0"){
			jQuery(".top_"+k+">u").css("color","red");
			jQuery(".top_"+k+">u").text("取消置顶");	
			jQuery("#top_id_"+k+"").val("999");
		}else{
			jQuery(".top_"+k+">u").css("color","green");
			jQuery(".top_"+k+">u").text("置顶");	
			jQuery("#top_id_"+k+"").val("0");
		}
	}
    },
    error: function (msg) {
        alert("响应失败!稍后再试");
    }
});
}
</script>
