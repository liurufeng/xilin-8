<script language="javascript">

function checkSubmit()
{
   if(document.form1.typename.value==""){
          alert("栏目名称不能为空！");
          document.form1.typename.focus();
          return false;
     }
     return true;
}

function checkispart()
{
	var ispart = document.getElementsByName("ispart");
	var ispartval;
	for(i=0;i<ispart.length;i++){
		if(ispart[i].checked){
			ispartval = ispart[i].value;
			break;
		}
	};
	var isparttr1 = document.getElementById("isparttr1");
	var isparttr2 = document.getElementById("isparttr2");
	var isparttr3 = document.getElementById("isparttr3");
	var isparttr5 = document.getElementById("isparttr5");
	var isparttr6 = document.getElementById("isparttr6");
    if(ispartval == '1'){
		isparttr1.style.display = 'block';
		isparttr2.style.display = 'block';
		isparttr3.style.display = 'block';
		isparttr5.style.display = 'none';
		isparttr6.style.display = 'none';
	}else{
		isparttr1.style.display = 'block';
		isparttr2.style.display = 'block';
		isparttr3.style.display = 'block';
		isparttr5.style.display = 'block';
		isparttr6.style.display = 'block';
	}
}
function channeltypeset()
{
	var ispart = document.getElementsByName("channeltype_set");
	var ispartval;
	for(i=0;i<ispart.length;i++){
		if(ispart[i].checked){
			ispartval = ispart[i].value;
			break;
		}
	};

	var channeltype = document.getElementById("channeltype");
	var channeltypesetname = document.getElementById("channeltypesetname");
	
    if(ispartval == 'true'){
	
		channeltype.style.display = 'none';
		channeltypesetname.style.display = 'block';
	}else{
		channeltype.style.display = 'block';
		channeltypesetname.style.display = 'none';
		
	}
}
checkispart();
</script>
